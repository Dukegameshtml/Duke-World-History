<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Duke World: Sovereign v4.0 - Total Edition</title>
    <style>
        :root {
            --gold: #ffcc00; --iron: #a0a0a0; --food: #7cfc00; --danger: #ff4d4d;
            --accent: #00d4ff; --bg: #050508; --glass: rgba(25, 25, 35, 0.95);
        }
        [data-theme="light"] { --bg: #f0f2f5; --glass: rgba(255, 255, 255, 0.95); --text: #1a1a1a; }

        * { box-sizing: border-box; transition: all 0.3s ease; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        [data-theme="light"] body { color: #1a1a1a; }

        /* --- UI GLASS PANELS --- */
        .glass { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        
        #hud-top { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); width: 96%; display: flex; flex-wrap: wrap; padding: 15px; gap: 15px; z-index: 1000; justify-content: space-around; }
        .res-item { display: flex; flex-direction: column; align-items: center; min-width: 60px; }
        .res-label { font-size: 9px; text-transform: uppercase; opacity: 0.7; letter-spacing: 1px; }
        .res-value { font-size: 16px; font-weight: 800; }

        /* --- MAP & PROVINCES --- */
        #viewport { width: 100%; height: 100vh; background: #000; position: relative; }
        svg { width: 100%; height: 100%; touch-action: none; }
        .prov { fill: #1a1a20; stroke: rgba(255,255,255,0.1); stroke-width: 1.5; cursor: pointer; }
        .prov.player { fill: rgba(139, 0, 0, 0.7); stroke: var(--danger); }
        .prov.enemy { fill: rgba(0, 50, 150, 0.7); stroke: var(--accent); }
        .prov.active { stroke: #fff; stroke-width: 3; filter: drop-shadow(0 0 15px var(--accent)); }
        
        /* --- COMMAND CENTER --- */
        #cmd-panel { position: fixed; right: 20px; top: 110px; width: 320px; padding: 25px; display: none; z-index: 900; }
        
        /* --- MOBILE MODE --- */
        body.mobile #cmd-panel { right: 0; left: 0; top: auto; bottom: 0; width: 100%; border-radius: 30px 30px 0 0; padding-bottom: 40px; }
        body.mobile #hud-top { padding: 10px; gap: 5px; }

        /* --- BUTTONS --- */
        .btn { width: 100%; padding: 14px; margin-top: 8px; border: none; border-radius: 12px; background: rgba(255,255,255,0.05); color: inherit; font-weight: 700; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .btn:hover { background: var(--accent); color: #000; }
        .btn-primary { background: var(--gold); color: #000; }
        .btn-turn { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 180px; height: 60px; border-radius: 30px; background: var(--success); color: #000; font-weight: 900; z-index: 1100; box-shadow: 0 0 30px rgba(0,255,163,0.4); border: none; cursor: pointer; }

        /* --- FLOATING UTILS --- */
        #utils { position: fixed; left: 20px; top: 110px; display: flex; flex-direction: column; gap: 10px; z-index: 2000; }
        .util-btn { width: 45px; height: 45px; border-radius: 12px; background: var(--glass); border: 1px solid var(--gold); color: var(--gold); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        .army-label { position: absolute; pointer-events: none; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); padding: 2px 8px; border-radius: 5px; font-size: 11px; border: 1px solid var(--gold); }
    </style>
</head>
<body data-theme="dark">

    <div id="utils">
        <button class="util-btn" onclick="toggleTheme()">🌓</button>
        <button class="util-btn" onclick="toggleMobile()">📱</button>
        <button class="util-btn" onclick="save()">💾</button>
    </div>

    <div id="hud-top" class="glass">
        <div class="res-item"><span class="res-label">Złoto</span><span class="res-value" id="res-gold" style="color:var(--gold)">1000</span></div>
        <div class="res-item"><span class="res-label">Żelazo</span><span class="res-value" id="res-iron" style="color:var(--iron)">100</span></div>
        <div class="res-item"><span class="res-label">Zboże</span><span class="res-value" id="res-food" style="color:var(--food)">200</span></div>
        <div class="res-item"><span class="res-label">Tura</span><span class="res-value" id="res-turn">1</span></div>
        <div class="res-item"><span class="res-label">Lud</span><span class="res-value" id="res-pop">80%</span></div>
    </div>

    <div id="viewport">
        <svg viewBox="0 0 1000 800" id="svg-map">
            <path id="p1" class="prov player" d="M150,150 L450,150 L420,500 L180,520 Z" onclick="sel('p1')" />
            <path id="p2" class="prov enemy" d="M450,150 L850,200 L780,550 L420,500 Z" onclick="sel('p2')" />
        </svg>
        <div id="army-layer"></div>
    </div>

    <div id="cmd-panel" class="glass">
        <h2 id="sel-name" style="margin:0">Region</h2>
        <p id="sel-status" style="opacity:0.6; font-size:12px; margin-bottom:20px"></p>
        
        <div id="action-list">
            <button class="btn" onclick="doAct('recruit')"><span>Rekrutacja</span><span style="font-size:10px; color:var(--iron)">-20⚙️ -40🌾</span></button>
            <button class="btn" onclick="doAct('farm')"><span>Rozbudowa Farm</span><span style="font-size:10px; color:var(--gold)">-300💰</span></button>
            <button class="btn" onclick="doAct('mine')"><span>Budowa Kopalni</span><span style="font-size:10px; color:var(--gold)">-300💰</span></button>
            <button class="btn" onclick="doAct('spy')"><span>Wywiad</span><span style="font-size:10px; color:var(--gold)">-100💰</span></button>
            <hr style="opacity:0.1; margin:15px 0">
            <button class="btn btn-primary" id="btn-attack" style="display:none" onclick="doAct('attack')">ROZPOCZNIJ INWAZJĘ ⚔️</button>
        </div>
    </div>

    <button class="btn-turn" onclick="next()">NASTĘPNA TURA</button>

    <script>
        let game = {
            gold: 1000, iron: 100, food: 200, pop: 80, turn: 1,
            income: { gold: 200, iron: 20, food: 40 },
            selected: null, revealed: ['p1'],
            provinces: {
                p1: { name: "Rdzeń", owner: "player", army: 2000, pos: [300, 350] },
                p2: { name: "Rubież", owner: "enemy", army: 1500, pos: [650, 380] }
            }
        };

        function toggleTheme() { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme')==='dark'?'light':'dark'); }
        function toggleMobile() { document.body.classList.toggle('mobile'); }
        function save() { localStorage.setItem('duke_v4', JSON.stringify(game)); alert("Zapisano!"); }

        function sel(id) {
            game.selected = id;
            document.querySelectorAll('.prov').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            const p = game.provinces[id];
            document.getElementById('cmd-panel').style.display = 'block';
            document.getElementById('sel-name').innerText = p.name;
            document.getElementById('sel-status').innerText = `Właściciel: ${p.owner.toUpperCase()} | Armia: ${game.revealed.includes(id) ? p.army : '???'}`;
            document.getElementById('btn-attack').style.display = p.owner === 'enemy' ? 'flex' : 'none';
        }

        function doAct(type) {
            if(type === 'recruit' && game.iron >= 20 && game.food >= 40) {
                game.iron -= 20; game.food -= 40; game.provinces.p1.army += 800; game.pop -= 5;
            } else if(type === 'farm' && game.gold >= 300) {
                game.gold -= 300; game.income.food += 30;
            } else if(type === 'mine' && game.gold >= 300) {
                game.gold -= 300; game.income.iron += 15;
            } else if(type === 'spy' && game.gold >= 100) {
                game.gold -= 100; game.revealed.push(game.selected);
            } else if(type === 'attack') {
                if(game.provinces.p1.army > game.provinces.p2.army) {
                    game.provinces.p2.owner = 'player'; alert("Zwycięstwo!");
                } else { game.provinces.p1.army = 200; alert("Porażka!"); }
            }
            updateUI();
        }

        function next() {
            game.turn++;
            game.gold += game.income.gold;
            game.iron += game.income.iron;
            game.food += game.income.food;
            game.food -= (game.provinces.p1.army / 100); // Armia je!
            game.pop -= 2;
            game.provinces.p2.army += 200;

            if(game.food < 0) { game.provinces.p1.army += (game.food * 5); game.food = 0; alert("GŁÓD W ARMII!"); }
            if(game.pop <= 0) { alert("REBELIA!"); location.reload(); }
            updateUI();
        }

        function updateUI() {
            document.getElementById('res-gold').innerText = Math.floor(game.gold);
            document.getElementById('res-iron').innerText = game.iron;
            document.getElementById('res-food').innerText = Math.floor(game.food);
            document.getElementById('res-turn').innerText = game.turn;
            document.getElementById('res-pop').innerText = game.pop + "%";

            const layer = document.getElementById('army-layer');
            layer.innerHTML = '';
            for(let id in game.provinces) {
                const p = game.provinces[id];
                const isKnown = game.revealed.includes(id) || p.owner === 'player';
                document.getElementById(id).className = `prov ${p.owner} ${game.selected === id ? 'active' : ''}`;
                if(isKnown) {
                    const tag = document.createElement('div');
                    tag.className = 'army-label';
                    tag.style.left = p.pos[0]+'px'; tag.style.top = p.pos[1]+'px';
                    tag.innerText = p.army;
                    layer.appendChild(tag);
                }
            }
        }

        // Load game
        const saved = localStorage.getItem('duke_v4');
        if(saved) game = JSON.parse(saved);
        updateUI();
    </script>
</body>
</html>
